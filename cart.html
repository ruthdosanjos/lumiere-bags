<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Carrinho | LUMIÈRE
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">

    <link rel="stylesheet" href="./css/pages/cart-page.css">


</head>


<body>


    <header class="header">


        <nav class="navbar">


            <div class="nav-container">


                <a href="./index.html" class="logo" aria-label="Lumière Bags - Página inicial">

                    LUMIÈRE

                </a>



                <ul class="nav-menu">


                    <li>

                        <a href="./index.html#featured">
                            Coleção
                        </a>

                    </li>


                    <li>

                        <a href="./index.html#products">
                            Loja
                        </a>

                    </li>


                    <li>

                        <a href="./index.html#story">
                            Sobre
                        </a>

                    </li>


                    <li>

                        <a href="./index.html#newsletter">
                            Contato
                        </a>

                    </li>


                </ul>




                <div class="nav-actions">



                    <button type="button" class="icon-button" aria-label="Pesquisar">


                        <i class="bi bi-search"></i>


                    </button>





                    <button type="button" class="icon-button cart-button" aria-label="Carrinho de compras">


                        <i class="bi bi-bag"></i>



                        <span class="cart-count">

                            0

                        </span>


                    </button>



                </div>



            </div>


        </nav>


    </header>


    <main class="cart-page">

        <section class="cart-header">

            <div class="container">

                <span class="breadcrumb">
                    Início / Meu carrinho
                </span>

                <h1>
                    Meu carrinho
                </h1>

                <p>
                    Revise seus produtos antes de finalizar a compra.
                </p>

            </div>

        </section>


        <section class="cart-container">


            <div class="cart-products">



                <div class="cart-page-list">

                    <!-- Produtos renderizados via JS -->

                </div>


            </div>



            <aside class="cart-summary">


                <h2>
                    Resumo do pedido
                </h2>


                <div class="summary-line">

                    <span>
                        Subtotal
                    </span>

                    <strong class="summary-subtotal">
                        R$ 0,00
                    </strong>

                </div>



                <div class="summary-line">

                    <span>
                        Frete
                    </span>

                    <strong>
                        R$ 0,00
                    </strong>

                </div>



                <div class="summary-total">

                    <span>
                        Total
                    </span>

                    <strong>
                        R$ 0,00
                    </strong>

                </div>



                <button class="checkout-button">

                    Finalizar compra

                </button>

                <p class="summary-note">

                    Compra protegida • Troca em até 30 dias

                </p>

            </aside>


        </section>


    </main>

   

    <script src="./js/products.js"></script>

    <script src="./js/cart.js"></script>

    <script src="./js/main.js"></script>

    <script src="./js/cart-page.js"></script>


</body>

</html>
