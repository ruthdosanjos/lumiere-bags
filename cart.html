<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Carrinho | LUMIÈRE
    </title>


    <link
        rel="stylesheet"
        href="./css/style.css">


   <link
    rel="stylesheet"
    href="./css/pages/cart-page.css">


</head>


<body>


<header>

    <!-- reutilizaremos o header futuramente -->

</header>



<main class="cart-page">


    <section class="cart-container">


        <div class="cart-products">


            <h1>
                Meu carrinho
            </h1>


            <div class="cart-page-list">

                <!-- Produtos renderizados via JS -->

            </div>


        </div>



        <aside class="cart-summary">


            <h2>
                Resumo do pedido
            </h2>


            <div class="summary-line">

                <span>
                    Subtotal
                </span>

                <strong>
                    R$ 0,00
                </strong>

            </div>



            <div class="summary-line">

                <span>
                    Frete
                </span>

                <strong>
                    R$ 0,00
                </strong>

            </div>



            <div class="summary-total">

                <span>
                    Total
                </span>

                <strong>
                    R$ 0,00
                </strong>

            </div>



            <button
                class="checkout-button">

                Finalizar compra

            </button>


        </aside>


    </section>


</main>


<script src="./js/products.js"></script>
<script src="./js/cart-page.js"></script>


</body>

</html>
